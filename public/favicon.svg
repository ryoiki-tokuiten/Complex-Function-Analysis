<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Circular Möbius transform icon">
  <defs>
    <!-- Main circular clip -->
    <clipPath id="clipCircle">
      <circle cx="32" cy="32" r="31"/>
    </clipPath>

    <!-- Background fills -->
    <radialGradient id="bgCore" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#131C35"/>
      <stop offset="58%" stop-color="#0C1327"/>
      <stop offset="100%" stop-color="#070B15"/>
    </radialGradient>

    <radialGradient id="ambientA" cx="24%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#A277FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A277FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientB" cx="78%" cy="76%" r="58%">
      <stop offset="0%" stop-color="#72D7FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#72D7FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Rim / line gradients -->
    <linearGradient id="rimGrad" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4B16D"/>
      <stop offset="42%" stop-color="#A277FF"/>
      <stop offset="100%" stop-color="#72D7FF"/>
    </linearGradient>

    <linearGradient id="familyA" x1="14" y1="16" x2="50" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B78AFF"/>
      <stop offset="100%" stop-color="#63DCFF"/>
    </linearGradient>

    <linearGradient id="familyB" x1="16" y1="50" x2="48" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F1A765"/>
      <stop offset="42%" stop-color="#9D7EFF"/>
      <stop offset="100%" stop-color="#68D8FF"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.0" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft inner shadow vibe -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
  </defs>

  <!-- Transparent outside the circle by default -->
  <g clip-path="url(#clipCircle)">
    <!-- Main disk -->
    <circle cx="32" cy="32" r="31" fill="url(#bgCore)"/>
    <circle cx="32" cy="32" r="31" fill="url(#ambientA)"/>
    <circle cx="32" cy="32" r="31" fill="url(#ambientB)"/>

    <!-- Subtle outer rim -->
    <circle
      cx="32"
      cy="32"
      r="30.25"
      fill="none"
      stroke="url(#rimGrad)"
      stroke-width="1.2"
      stroke-opacity="0.95"
      filter="url(#glow)"
    />

    <!-- Inner field -->
    <circle cx="32" cy="32" r="27.5" fill="#0B1122"/>

    <!-- Very faint axis hints -->
    <path d="M6 32H58" stroke="#A9B8F3" stroke-opacity="0.10" stroke-width="0.8"/>
    <path d="M32 6V58" stroke="#A9B8F3" stroke-opacity="0.10" stroke-width="0.8"/>

    <!-- Family A: orthogonal-circle-style arcs -->
    <g fill="none" stroke="url(#familyA)" stroke-linecap="round" filter="url(#glow)">
      <circle cx="-6" cy="32" r="31.5" stroke-width="1.00" stroke-opacity="0.42"/>
      <circle cx="4"  cy="32" r="21.5" stroke-width="1.08" stroke-opacity="0.66"/>
      <circle cx="60" cy="32" r="21.5" stroke-width="1.08" stroke-opacity="0.66"/>
      <circle cx="70" cy="32" r="31.5" stroke-width="1.00" stroke-opacity="0.42"/>
    </g>

    <!-- Family B: companion orthogonal family -->
    <g fill="none" stroke="url(#familyB)" stroke-linecap="round" filter="url(#glow)">
      <circle cx="32" cy="-6" r="31.5" stroke-width="1.00" stroke-opacity="0.38"/>
      <circle cx="32" cy="4"  r="21.5" stroke-width="1.08" stroke-opacity="0.60"/>
      <circle cx="32" cy="60" r="21.5" stroke-width="1.08" stroke-opacity="0.60"/>
      <circle cx="32" cy="70" r="31.5" stroke-width="1.00" stroke-opacity="0.38"/>
    </g>

    <!-- A slight diagonal transformed path so it feels designed, not mechanically sterile -->
    <path
      d="M18 45.5
         C22.5 40, 27 36.5, 32 32
         C37 27.5, 41.5 24, 46 18.5"
      fill="none"
      stroke="#C19BFF"
      stroke-width="0.95"
      stroke-opacity="0.34"
      stroke-linecap="round"
      filter="url(#glow)"
    />

    <!-- Focal points -->
    <g filter="url(#glow)">
      <circle cx="32" cy="32" r="1.75" fill="#F8FBFF"/>
      <circle cx="44.8" cy="25.8" r="1.45" fill="#72D7FF"/>
      <circle cx="23.2" cy="43.2" r="1.45" fill="#F4B16D"/>
    </g>

    <!-- Subtle highlight -->
    <path
      d="M17 16.5 A27.5 27.5 0 0 1 47.8 20.8"
      fill="none"
      stroke="#FFFFFF"
      stroke-opacity="0.09"
      stroke-width="0.9"
      stroke-linecap="round"
    />

    <!-- Edge vignette -->
    <circle cx="32" cy="32" r="31" fill="url(#vignette)"/>
  </g>
</svg>
