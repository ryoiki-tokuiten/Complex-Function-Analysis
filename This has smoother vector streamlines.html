<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamental Theorem of Algebra: 3D Winding & Vector Flow</title>
    
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' },
                        accent: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    },

                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { margin: 0; overflow: hidden; background-color: #030712; color: #e5e7eb; }
        #root { width: 100vw; height: 100vh; display: flex; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #38bdf8; cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #374151; border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }
        
        .math-text { font-family: 'Fira Code', monospace; font-size: 0.9em; color: #93c5fd; }
        
        /* Loading Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030712; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #38bdf8; transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%; border-top-color: #38bdf8; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="loader">
        <div class="spinner mb-4"></div>
        <div class="font-mono text-sm tracking-widest uppercase">Initializing Math Engine</div>
    </div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useMemo, useCallback, useReducer } = React;

        // ==========================================
        // 1. MATHEMATICS ENGINE (Complex & Polynomials)
        // ==========================================

        /**
         * Robust Complex Number implementation.
         */
        class Complex {
            constructor(re, im = 0) {
                this.re = re;
                this.im = im;
            }
            static fromPolar(r, theta) {
                return new Complex(r * Math.cos(theta), r * Math.sin(theta));
            }
            add(c) { return new Complex(this.re + c.re, this.im + c.im); }
            sub(c) { return new Complex(this.re - c.re, this.im - c.im); }
            mul(c) {
                return new Complex(
                    this.re * c.re - this.im * c.im,
                    this.re * c.im + this.im * c.re
                );
            }
            div(c) {
                const denom = c.re * c.re + c.im * c.im;
                if (denom === 0) throw new Error("Division by zero");
                return new Complex(
                    (this.re * c.re + this.im * c.im) / denom,
                    (this.im * c.re - this.re * c.im) / denom
                );
            }
            pow(n) {
                if (n === 0) return new Complex(1, 0);
                if (n === 1) return new Complex(this.re, this.im);
                let r = this.abs();
                let theta = this.arg();
                let r_n = Math.pow(r, n);
                let theta_n = theta * n;
                return Complex.fromPolar(r_n, theta_n);
            }
            abs() { return Math.sqrt(this.re * this.re + this.im * this.im); }
            arg() { return Math.atan2(this.im, this.re); }
            conjugate() { return new Complex(this.re, -this.im); }
            clone() { return new Complex(this.re, this.im); }
            toString() {
                const sign = this.im >= 0 ? '+' : '-';
                return `${this.re.toFixed(2)} ${sign} ${Math.abs(this.im).toFixed(2)}i`;
            }
        }

        /**
         * Polynomial representation and operations.
         * P(z) = a_n*z^n + a_{n-1}*z^{n-1} + ... + a_0
         * Coefficients array: [a_0, a_1, ..., a_n]
         */
        class Polynomial {
            constructor(coeffs) {
                // coeffs is an array of Complex numbers, index is degree
                this.coeffs = coeffs;
                this.degree = coeffs.length - 1;
            }

            evaluate(z) {
                let result = new Complex(0, 0);
                let z_pow = new Complex(1, 0);
                for (let i = 0; i <= this.degree; i++) {
                    result = result.add(this.coeffs[i].mul(z_pow));
                    z_pow = z_pow.mul(z);
                }
                return result;
            }

            derivative() {
                if (this.degree === 0) return new Polynomial([new Complex(0, 0)]);
                let dCoeffs = [];
                for (let i = 1; i <= this.degree; i++) {
                    dCoeffs.push(this.coeffs[i].mul(new Complex(i, 0)));
                }
                return new Polynomial(dCoeffs);
            }

            // Calculate winding number numerically along a circle of radius R
            calculateWindingNumber(R, segments = 500) {
                let totalAngleChange = 0;
                let prevArg = null;

                for (let i = 0; i <= segments; i++) {
                    let theta = (i / segments) * 2 * Math.PI;
                    let z = Complex.fromPolar(R, theta);
                    let w = this.evaluate(z);
                    
                    if (w.abs() < 1e-10) {
                        // Curve passes through origin, winding number undefined/changing
                        return null; 
                    }

                    let currentArg = w.arg();

                    if (prevArg !== null) {
                        let diff = currentArg - prevArg;
                        // Normalize difference to [-pi, pi] to handle branch cut crossing
                        while (diff > Math.PI) diff -= 2 * Math.PI;
                        while (diff < -Math.PI) diff += 2 * Math.PI;
                        totalAngleChange += diff;
                    }
                    prevArg = currentArg;
                }

                return Math.round(totalAngleChange / (2 * Math.PI));
            }

            // Durand-Kerner method to find all complex roots simultaneously
            findRoots(maxIter = 100, tolerance = 1e-6) {
                if (this.degree <= 0) return [];
                
                // Normalize polynomial (make leading coefficient 1)
                const a_n = this.coeffs[this.degree];
                if (a_n.abs() === 0) return []; // Invalid polynomial
                
                const normCoeffs = this.coeffs.map(c => c.div(a_n));
                const pNorm = new Polynomial(normCoeffs);

                // Initial guesses: points on a circle
                let roots = [];
                let radius = 1.0; // Heuristic initial radius
                for (let i = 0; i < this.degree; i++) {
                    let angle = (i / this.degree) * 2 * Math.PI + 0.1; // slight offset
                    roots.push(Complex.fromPolar(radius, angle));
                }

                for (let iter = 0; iter < maxIter; iter++) {
                    let maxDiff = 0;
                    let nextRoots = [];

                    for (let i = 0; i < this.degree; i++) {
                        let num = pNorm.evaluate(roots[i]);
                        let den = new Complex(1, 0);
                        for (let j = 0; j < this.degree; j++) {
                            if (i !== j) {
                                den = den.mul(roots[i].sub(roots[j]));
                            }
                        }
                        
                        if (den.abs() < 1e-10) {
                            nextRoots.push(roots[i]); // Prevent division by zero
                            continue;
                        }

                        let correction = num.div(den);
                        let nextRoot = roots[i].sub(correction);
                        nextRoots.push(nextRoot);

                        let diff = correction.abs();
                        if (diff > maxDiff) maxDiff = diff;
                    }

                    roots = nextRoots;
                    if (maxDiff < tolerance) break;
                }
                return roots;
            }
        }

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================

        const PRESETS = {
            "Quadratic (2 Roots)": [new Complex(-1, 0), new Complex(0, 0), new Complex(1, 0)], // z^2 - 1
            "Cubic (3 Roots)": [new Complex(1, 0), new Complex(0, 0), new Complex(0, 0), new Complex(1, 0)], // z^3 + 1
            "Quartic (4 Roots)": [new Complex(1, 0), new Complex(0, 0), new Complex(1, 0), new Complex(0, 0), new Complex(1, 0)], // z^4 + z^2 + 1
            "Complex Coeffs": [new Complex(0, 1), new Complex(-1, 0.5), new Complex(1, -1)], // (1-i)z^2 + (-1+0.5i)z + i
            "High Degree (n=5)": [new Complex(-2, 0), new Complex(0, 0), new Complex(0, 0), new Complex(0, 0), new Complex(0, 0), new Complex(0.5, 0)] // 0.5z^5 - 2
        };

        const initialState = {
            coefficients: PRESETS["Quadratic (2 Roots)"],
            radius: 2.0,
            isAnimatingRadius: false,
            showVectorField: true,
            showStreamlines: true,
            vectorDensity: 20,
            viewMode: 'split', // 'split', '2d', '3d'
            roots: [],
            windingNumber: 2
        };

        function reducer(state, action) {
            switch (action.type) {
                case 'SET_COEFFS':
                    const poly = new Polynomial(action.payload);
                    return { 
                        ...state, 
                        coefficients: action.payload,
                        roots: poly.findRoots(),
                        windingNumber: poly.calculateWindingNumber(state.radius)
                    };
                case 'SET_RADIUS':
                    const p = new Polynomial(state.coefficients);
                    return { 
                        ...state, 
                        radius: action.payload,
                        windingNumber: p.calculateWindingNumber(action.payload)
                    };
                case 'TOGGLE_ANIMATION':
                    return { ...state, isAnimatingRadius: !state.isAnimatingRadius };
                case 'SET_PRESET':
                    const presetCoeffs = PRESETS[action.payload];
                    const presetPoly = new Polynomial(presetCoeffs);
                    return {
                        ...state,
                        coefficients: presetCoeffs,
                        roots: presetPoly.findRoots(),
                        windingNumber: presetPoly.calculateWindingNumber(state.radius),
                        radius: 2.0 // Reset radius on preset change
                    };
                case 'UPDATE_COEFF':
                    const newCoeffs = [...state.coefficients];
                    newCoeffs[action.index] = action.value;
                    const updatedPoly = new Polynomial(newCoeffs);
                    return {
                        ...state,
                        coefficients: newCoeffs,
                        roots: updatedPoly.findRoots(),
                        windingNumber: updatedPoly.calculateWindingNumber(state.radius)
                    };
                case 'ADD_DEGREE':
                    if (state.coefficients.length > 5) return state; // Max degree 5 for performance
                    const addedCoeffs = [...state.coefficients, new Complex(1, 0)];
                    const addedPoly = new Polynomial(addedCoeffs);
                    return {
                        ...state,
                        coefficients: addedCoeffs,
                        roots: addedPoly.findRoots(),
                        windingNumber: addedPoly.calculateWindingNumber(state.radius)
                    };
                case 'REMOVE_DEGREE':
                    if (state.coefficients.length <= 2) return state; // Min degree 1
                    const removedCoeffs = state.coefficients.slice(0, -1);
                    const removedPoly = new Polynomial(removedCoeffs);
                    return {
                        ...state,
                        coefficients: removedCoeffs,
                        roots: removedPoly.findRoots(),
                        windingNumber: removedPoly.calculateWindingNumber(state.radius)
                    };
                case 'TOGGLE_STREAMLINES':
                    return { ...state, showStreamlines: !state.showStreamlines };
                default:
                    return state;
            }
        }

        // ==========================================
        // 3. 2D VECTOR FIELD & STREAMLINE ENGINE (Canvas)
        // ==========================================

        const VectorField2D = ({ state }) => {
            const canvasRef = useRef(null);
            const particlesRef = useRef([]);
            const animationRef = useRef(null);

            const poly = useMemo(() => new Polynomial(state.coefficients), [state.coefficients]);

            // Initialize particles
            useEffect(() => {
                const numParticles = 1000;
                particlesRef.current = Array.from({ length: numParticles }, () => ({
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10,
                    age: Math.random() * 100,
                    maxAge: 50 + Math.random() * 100
                }));
            }, []);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width = canvas.clientWidth;
                let height = canvas.clientHeight;
                canvas.width = width;
                canvas.height = height;

                const scale = Math.min(width, height) / 10; // Viewport from -5 to 5
                const cx = width / 2;
                const cy = height / 2;

                const toScreen = (x, y) => [cx + x * scale, cy - y * scale];
                const toMath = (sx, sy) => [(sx - cx) / scale, -(sy - cy) / scale];

                const drawGrid = () => {
                    ctx.strokeStyle = '#1f2937';
                    ctx.lineWidth = 1;
                    for (let i = -5; i <= 5; i++) {
                        ctx.beginPath();
                        let [sx1, sy1] = toScreen(i, -5);
                        let [sx2, sy2] = toScreen(i, 5);
                        ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        let [sx3, sy3] = toScreen(-5, i);
                        let [sx4, sy4] = toScreen(5, i);
                        ctx.moveTo(sx3, sy3); ctx.lineTo(sx4, sy4);
                        ctx.stroke();
                    }
                    // Axes
                    ctx.strokeStyle = '#374151';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(width, cy); ctx.stroke();
                };

                const drawVectorField = () => {
                    const step = 10 / state.vectorDensity;
                    for (let x = -5; x <= 5; x += step) {
                        for (let y = -5; y <= 5; y += step) {
                            const z = new Complex(x, y);
                            const w = poly.evaluate(z);
                            
                            const mag = w.abs();
                            if (mag < 0.01) continue;

                            // Normalize vector for drawing
                            const dirX = w.re / mag;
                            const dirY = w.im / mag;

                            const [sx, sy] = toScreen(x, y);
                            const length = step * scale * 0.6;
                            
                            // Color based on phase (argument)
                            const hue = (w.arg() + Math.PI) / (2 * Math.PI) * 360;
                            ctx.strokeStyle = `hsla(${hue}, 70%, 50%, 0.5)`;
                            ctx.lineWidth = 1.5;

                            ctx.beginPath();
                            ctx.moveTo(sx, sy);
                            ctx.lineTo(sx + dirX * length, sy - dirY * length);
                            ctx.stroke();

                            // Arrow head
                            ctx.fillStyle = ctx.strokeStyle;
                            ctx.beginPath();
                            ctx.arc(sx + dirX * length, sy - dirY * length, 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                };

                const drawInputCircle = () => {
                    ctx.strokeStyle = '#facc15'; // Yellow
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.arc(cx, cy, state.radius * scale, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Draw a point moving along the circle to show mapping direction
                    const time = Date.now() * 0.001;
                    const px = state.radius * Math.cos(time);
                    const py = state.radius * Math.sin(time);
                    const [spx, spy] = toScreen(px, py);
                    ctx.fillStyle = '#facc15';
                    ctx.beginPath();
                    ctx.arc(spx, spy, 5, 0, Math.PI * 2);
                    ctx.fill();
                };

                const drawRoots = () => {
                    state.roots.forEach(root => {
                        const [sx, sy] = toScreen(root.re, root.im);
                        
                        // Glow effect
                        const gradient = ctx.createRadialGradient(sx, sy, 0, sx, sy, 15);
                        gradient.addColorStop(0, 'rgba(239, 68, 68, 0.8)');
                        gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath(); ctx.arc(sx, sy, 15, 0, Math.PI * 2); ctx.fill();

                        // Core
                        ctx.fillStyle = '#ef4444'; // Red
                        ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
                    });
                };

                const updateAndDrawParticles = () => {
                    ctx.fillStyle = 'rgba(3, 7, 18, 0.1)'; // Fade effect for trails
                    ctx.fillRect(0, 0, width, height);

                    drawGrid();
                    if (state.showVectorField) drawVectorField();
                    drawInputCircle();
                    drawRoots();

                    if (!state.showStreamlines) return;

                    ctx.lineWidth = 1.5;
                    particlesRef.current.forEach(p => {
                        const z = new Complex(p.x, p.y);
                        const w = poly.evaluate(z);
                        const mag = w.abs();

                        if (mag > 0.001) {
                            // Move particle along vector field
                            const speed = 0.05;
                            const dx = (w.re / mag) * speed;
                            const dy = (w.im / mag) * speed;

                            const [sx1, sy1] = toScreen(p.x, p.y);
                            p.x += dx;
                            p.y += dy;
                            const [sx2, sy2] = toScreen(p.x, p.y);

                            const hue = (w.arg() + Math.PI) / (2 * Math.PI) * 360;
                            const alpha = 1 - (p.age / p.maxAge);
                            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
                            
                            ctx.beginPath();
                            ctx.moveTo(sx1, sy1);
                            ctx.lineTo(sx2, sy2);
                            ctx.stroke();
                        }

                        p.age++;
                        if (p.age > p.maxAge || p.x < -6 || p.x > 6 || p.y < -6 || p.y > 6) {
                            // Respawn
                            p.x = (Math.random() - 0.5) * 10;
                            p.y = (Math.random() - 0.5) * 10;
                            p.age = 0;
                            p.maxAge = 50 + Math.random() * 100;
                        }
                    });
                };

                const renderLoop = () => {
                    updateAndDrawParticles();
                    animationRef.current = requestAnimationFrame(renderLoop);
                };

                renderLoop();

                return () => {
                    cancelAnimationFrame(animationRef.current);
                };
            }, [state, poly]);

            return (
                <div className="relative w-full h-full bg-gray-950 overflow-hidden border-r border-gray-800">
                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full"></canvas>
                    <div className="absolute top-4 left-4 bg-gray-900/80 backdrop-blur p-3 rounded-lg border border-gray-800 shadow-xl">
                        <h3 className="text-sm font-semibold text-gray-200 mb-1">z-plane (Input)</h3>
                        <p className="text-xs text-gray-400">Vector Field: <span className="math-text">V(z) = P(z)</span></p>
                        <div className="mt-2 flex items-center gap-2">
                            <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
                            <span className="text-xs text-gray-300">Input Circle |z| = {state.radius.toFixed(2)}</span>
                        </div>
                        <div className="mt-1 flex items-center gap-2">
                            <div className="w-3 h-3 rounded-full bg-red-500"></div>
                            <span className="text-xs text-gray-300">Roots P(z) = 0</span>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. 3D WINDING ENGINE (Three.js)
        // ==========================================

        const Winding3D = ({ state }) => {
            const containerRef = useRef(null);
            const sceneRef = useRef(null);
            const rendererRef = useRef(null);
            const cameraRef = useRef(null);
            const tubeMeshRef = useRef(null);
            const poly = useMemo(() => new Polynomial(state.coefficients), [state.coefficients]);

            useEffect(() => {
                if (!containerRef.current) return;

                // Setup Scene
                const scene = new THREE.Scene();
                scene.background = new THREE.Color('#030712');
                sceneRef.current = scene;

                // Setup Camera
                const camera = new THREE.PerspectiveCamera(45, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.set(15, 15, 20);
                cameraRef.current = camera;

                // Setup Renderer
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                containerRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                // Controls
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(10, 20, 10);
                scene.add(dirLight);

                // Grid & Axes
                const gridHelper = new THREE.GridHelper(20, 20, 0x374151, 0x1f2937);
                gridHelper.position.y = -10; // Base plane
                scene.add(gridHelper);

                // The Central Pole (Z-axis representing origin in w-plane)
                const poleGeo = new THREE.CylinderGeometry(0.05, 0.05, 40, 16);
                const poleMat = new THREE.MeshBasicMaterial({ color: 0xef4444 }); // Red pole
                const pole = new THREE.Mesh(poleGeo, poleMat);
                scene.add(pole);

                // Animation Loop
                let animationId;
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                };
                animate();

                // Handle Resize
                const handleResize = () => {
                    if (!containerRef.current || !cameraRef.current || !rendererRef.current) return;
                    const width = containerRef.current.clientWidth;
                    const height = containerRef.current.clientHeight;
                    cameraRef.current.aspect = width / height;
                    cameraRef.current.updateProjectionMatrix();
                    rendererRef.current.setSize(width, height);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationId);
                    if (containerRef.current && renderer.domElement) {
                        containerRef.current.removeChild(renderer.domElement);
                    }
                    renderer.dispose();
                };
            }, []);

            // Update Geometry when state changes
            useEffect(() => {
                if (!sceneRef.current) return;
                const scene = sceneRef.current;

                if (tubeMeshRef.current) {
                    scene.remove(tubeMeshRef.current);
                    tubeMeshRef.current.geometry.dispose();
                    tubeMeshRef.current.material.dispose();
                }

                // Generate 3D Curve: (Re(w), Im(w), theta)
                class WindingCurve extends THREE.Curve {
                    constructor(polynomial, radius) {
                        super();
                        this.polynomial = polynomial;
                        this.radius = radius;
                    }
                    getPoint(t, optionalTarget = new THREE.Vector3()) {
                        // t goes from 0 to 1. Map to theta from 0 to 2PI
                        const theta = t * Math.PI * 2;
                        const z = Complex.fromPolar(this.radius, theta);
                        const w = this.polynomial.evaluate(z);
                        
                        // Scale down w for visualization if it gets too large
                        let scale = 1;
                        const maxW = Math.pow(this.radius, this.polynomial.degree) * 2; // rough estimate
                        if (maxW > 15) scale = 15 / maxW;

                        // Map theta to Y axis (height) to show winding
                        const y = (t - 0.5) * 20; // Height from -10 to 10
                        
                        return optionalTarget.set(w.re * scale, y, w.im * scale);
                    }
                }

                const path = new WindingCurve(poly, state.radius);
                
                // Create Tube Geometry
                const tubularSegments = 300;
                const radialSegments = 16;
                const tubeRadius = 0.15;
                const geometry = new THREE.TubeGeometry(path, tubularSegments, tubeRadius, radialSegments, false);

                // Vertex Colors based on phase
                const colors = [];
                const color = new THREE.Color();
                for (let i = 0; i <= tubularSegments; i++) {
                    const t = i / tubularSegments;
                    const theta = t * Math.PI * 2;
                    const z = Complex.fromPolar(state.radius, theta);
                    const w = poly.evaluate(z);
                    
                    // Hue based on argument of w
                    const hue = (w.arg() + Math.PI) / (2 * Math.PI);
                    color.setHSL(hue, 0.8, 0.5);
                    
                    // Apply color to all vertices in this segment
                    for (let j = 0; j <= radialSegments; j++) {
                        colors.push(color.r, color.g, color.b);
                    }
                }
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

                const material = new THREE.MeshStandardMaterial({ 
                    vertexColors: true,
                    roughness: 0.4,
                    metalness: 0.1,
                    side: THREE.DoubleSide
                });

                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                tubeMeshRef.current = mesh;

                // Add intersection markers (where curve hits Z-axis)
                // This happens when w = 0.
                // We approximate by finding points close to origin in XZ plane
                const markers = [];
                for(let i=0; i<=tubularSegments; i++) {
                    const pt = path.getPoint(i/tubularSegments);
                    const distToYAxis = Math.sqrt(pt.x*pt.x + pt.z*pt.z);
                    if(distToYAxis < 0.5 && state.radius > 0.1) { // Threshold
                        const markerGeo = new THREE.SphereGeometry(0.4, 16, 16);
                        const markerMat = new THREE.MeshBasicMaterial({color: 0xffffff});
                        const marker = new THREE.Mesh(markerGeo, markerMat);
                        marker.position.copy(pt);
                        scene.add(marker);
                        markers.push(marker);
                    }
                }

                return () => {
                    markers.forEach(m => {
                        scene.remove(m);
                        m.geometry.dispose();
                        m.material.dispose();
                    });
                };

            }, [state.coefficients, state.radius, poly]);

            return (
                <div className="relative w-full h-full bg-gray-950">
                    <div ref={containerRef} className="absolute inset-0 w-full h-full"></div>
                    <div className="absolute top-4 right-4 bg-gray-900/80 backdrop-blur p-3 rounded-lg border border-gray-800 shadow-xl text-right">
                        <h3 className="text-sm font-semibold text-gray-200 mb-1">w-plane (Output) × θ</h3>
                        <p className="text-xs text-gray-400">Curve: <span className="math-text">(Re(w), θ, Im(w))</span></p>
                        <div className="mt-2 flex items-center justify-end gap-2">
                            <span className="text-xs text-gray-300">Winding Number:</span>
                            <span className={`font-mono font-bold text-lg ${state.windingNumber === 0 ? 'text-red-400' : 'text-accent-400'}`}>
                                {state.windingNumber !== null ? state.windingNumber : 'Undefined'}
                            </span>
                        </div>
                        <p className="text-[10px] text-gray-500 mt-1 max-w-[200px]">
                            The red pole represents the origin (0+0i). The number of times the tube wraps around it is the winding number.
                        </p>
                    </div>
                    
                    {/* Overlay instructions */}
                    <div className="absolute bottom-4 right-4 text-gray-500 text-xs flex items-center gap-2 bg-gray-900/50 px-2 py-1 rounded">
                        <i data-lucide="mouse" className="w-3 h-3"></i> Drag to rotate, Scroll to zoom
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. UI COMPONENTS
        // ==========================================

        const ControlPanel = ({ state, dispatch }) => {
            
            // Animation loop for radius
            useEffect(() => {
                let animationFrame;
                if (state.isAnimatingRadius) {
                    const animate = () => {
                        dispatch({ 
                            type: 'SET_RADIUS', 
                            // Oscillate radius between 0.1 and 5.0
                            payload: 2.55 + 2.45 * Math.sin(Date.now() * 0.001) 
                        });
                        animationFrame = requestAnimationFrame(animate);
                    };
                    animate();
                }
                return () => cancelAnimationFrame(animationFrame);
            }, [state.isAnimatingRadius, dispatch]);

            const handleCoeffChange = (index, part, value) => {
                const current = state.coefficients[index];
                const newVal = parseFloat(value);
                if (isNaN(newVal)) return;
                
                const updated = part === 're' 
                    ? new Complex(newVal, current.im)
                    : new Complex(current.re, newVal);
                
                dispatch({ type: 'UPDATE_COEFF', index, value: updated });
            };

            return (
                <div className="w-96 h-full bg-gray-900 border-r border-gray-800 flex flex-col shadow-2xl z-10 overflow-hidden">
                    {/* Header */}
                    <div className="p-6 border-b border-gray-800 bg-gray-950">
                        <h1 className="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-accent-400 to-blue-500">
                            FTA Visualizer
                        </h1>
                        <p className="text-xs text-gray-400 mt-1">Fundamental Theorem of Algebra via Winding Numbers</p>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
                        
                        {/* Theory Section */}
                        <section>
                            <h2 className="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3 flex items-center gap-2">
                                <i data-lucide="book-open" className="w-4 h-4 text-accent-500"></i> The Intuition
                            </h2>
                            <div className="text-sm text-gray-400 space-y-2 leading-relaxed bg-gray-850 p-4 rounded-lg border border-gray-800">
                                <p>
                                    Consider a polynomial <span className="math-text">P(z)</span> of degree <span className="math-text">n</span>. 
                                    We map a circle of radius <span className="math-text">R</span> from the z-plane to the w-plane.
                                </p>
                                <p>
                                    For huge <span className="math-text">R</span>, <span className="math-text">P(z) ≈ z^n</span>. The output curve winds around the origin exactly <span className="math-text">n</span> times.
                                </p>
                                <p>
                                    For tiny <span className="math-text">R</span>, <span className="math-text">P(z) ≈ a_0</span>. The curve is a tiny loop near <span className="math-text">a_0</span>, winding <span className="math-text">0</span> times around the origin.
                                </p>
                                <p className="text-accent-400 font-medium">
                                    To change winding number from n to 0 as R shrinks, the curve MUST pass through the origin. Thus, P(z) = 0 has a root!
                                </p>
                            </div>
                        </section>

                        {/* Controls Section */}
                        <section>
                            <h2 className="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3 flex items-center gap-2">
                                <i data-lucide="sliders" className="w-4 h-4 text-accent-500"></i> Global Controls
                            </h2>
                            
                            <div className="space-y-4 bg-gray-850 p-4 rounded-lg border border-gray-800">
                                <div>
                                    <label className="text-xs text-gray-400 flex justify-between mb-2">
                                        <span>Input Radius (R)</span>
                                        <span className="font-mono text-accent-400">{state.radius.toFixed(2)}</span>
                                    </label>
                                    <div className="flex items-center gap-3">
                                        <button 
                                            onClick={() => dispatch({ type: 'TOGGLE_ANIMATION' })}
                                            className={`p-2 rounded-md transition-colors ${state.isAnimatingRadius ? 'bg-red-500/20 text-red-400' : 'bg-accent-500/20 text-accent-400 hover:bg-accent-500/30'}`}
                                            title={state.isAnimatingRadius ? "Pause" : "Auto-Animate"}
                                        >
                                            <i data-lucide={state.isAnimatingRadius ? "pause" : "play"} className="w-4 h-4"></i>
                                        </button>
                                        <input 
                                            type="range" 
                                            min="0.01" max="5" step="0.01" 
                                            value={state.radius}
                                            onChange={(e) => {
                                                if(state.isAnimatingRadius) dispatch({type: 'TOGGLE_ANIMATION'});
                                                dispatch({ type: 'SET_RADIUS', payload: parseFloat(e.target.value) });
                                            }}
                                            className="flex-1"
                                        />
                                    </div>
                                </div>

                                <div className="pt-2 border-t border-gray-700">
                                    <label className="text-xs text-gray-400 mb-2 block">Presets</label>
                                    <select 
                                        className="w-full bg-gray-900 border border-gray-700 text-sm rounded-md p-2 text-gray-300 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none"
                                        onChange={(e) => dispatch({ type: 'SET_PRESET', payload: e.target.value })}
                                    >
                                        {Object.keys(PRESETS).map(key => (
                                            <option key={key} value={key}>{key}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="pt-2 border-t border-gray-700 flex items-center justify-between">
                                    <span className="text-xs text-gray-400">Vector Streamlines</span>
                                    <button 
                                        onClick={() => dispatch({ type: 'TOGGLE_STREAMLINES' })}
                                        className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${state.showStreamlines ? 'bg-accent-500' : 'bg-gray-600'}`}
                                    >
                                        <span className={`inline-block h-3 w-3 transform rounded-full bg-white transition-transform ${state.showStreamlines ? 'translate-x-5' : 'translate-x-1'}`}/>
                                    </button>
                                </div>
                            </div>
                        </section>

                        {/* Polynomial Coefficients */}
                        <section>
                            <div className="flex items-center justify-between mb-3">
                                <h2 className="text-sm font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                                    <i data-lucide="function-square" className="w-4 h-4 text-accent-500"></i> Polynomial P(z)
                                </h2>
                                <div className="flex gap-1">
                                    <button onClick={() => dispatch({type: 'REMOVE_DEGREE'})} className="p-1 bg-gray-800 hover:bg-gray-700 rounded text-gray-400" title="Decrease Degree"><i data-lucide="minus" className="w-3 h-3"></i></button>
                                    <button onClick={() => dispatch({type: 'ADD_DEGREE'})} className="p-1 bg-gray-800 hover:bg-gray-700 rounded text-gray-400" title="Increase Degree"><i data-lucide="plus" className="w-3 h-3"></i></button>
                                </div>
                            </div>

                            <div className="space-y-3">
                                {state.coefficients.map((coeff, index) => (
                                    <div key={index} className="bg-gray-850 p-3 rounded-lg border border-gray-800 relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-accent-500/50"></div>
                                        <div className="flex justify-between items-center mb-2 pl-2">
                                            <span className="text-xs font-mono text-gray-300">
                                                a<sub>{index}</sub> <span className="text-gray-500">z^{index}</span>
                                            </span>
                                            <span className="text-[10px] font-mono text-accent-400 bg-accent-400/10 px-1.5 py-0.5 rounded">
                                                {coeff.toString()}
                                            </span>
                                        </div>
                                        <div className="space-y-2 pl-2">
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] text-gray-500 w-4">Re</span>
                                                <input 
                                                    type="range" min="-5" max="5" step="0.1" 
                                                    value={coeff.re}
                                                    onChange={(e) => handleCoeffChange(index, 're', e.target.value)}
                                                />
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] text-gray-500 w-4">Im</span>
                                                <input 
                                                    type="range" min="-5" max="5" step="0.1" 
                                                    value={coeff.im}
                                                    onChange={(e) => handleCoeffChange(index, 'im', e.target.value)}
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )).reverse()} {/* Reverse to show highest degree first */}
                            </div>
                        </section>

                    </div>
                    
                    {/* Footer Stats */}
                    <div className="p-4 border-t border-gray-800 bg-gray-950 text-xs text-gray-500 flex justify-between items-center">
                        <span>Degree: {state.coefficients.length - 1}</span>
                        <span>Roots Found: {state.roots.length}</span>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. MAIN APP ASSEMBLY
        // ==========================================

        const App = () => {
            const [state, dispatch] = useReducer(reducer, initialState);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                // Simulate initialization time to ensure libraries are ready and show loader
                const timer = setTimeout(() => {
                    lucide.createIcons();
                    setIsLoaded(true);
                    const loader = document.getElementById('loader');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }
                }, 1000);
                return () => clearTimeout(timer);
            }, []);

            // Re-initialize icons when state changes might render new ones
            useEffect(() => {
                if(isLoaded) lucide.createIcons();
            });

            if (!isLoaded) return null;

            return (
                <div className="flex w-full h-full">
                    <ControlPanel state={state} dispatch={dispatch} />
                    
                    <div className="flex-1 flex flex-col lg:flex-row relative">
                        {/* 2D View */}
                        <div className="flex-1 h-1/2 lg:h-full relative">
                            <VectorField2D state={state} />
                        </div>
                        
                        {/* 3D View */}
                        <div className="flex-1 h-1/2 lg:h-full relative border-t lg:border-t-0 lg:border-l border-gray-800">
                            <Winding3D state={state} />
                        </div>

                        {/* Central Overlay Badge */}
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none hidden lg:flex">
                            <div className="bg-gray-900/90 backdrop-blur-md border border-gray-700 px-4 py-2 rounded-full shadow-2xl flex items-center gap-3">
                                <span className="text-xs text-gray-400 uppercase tracking-widest">Mapping</span>
                                <i data-lucide="arrow-right" className="w-4 h-4 text-accent-500"></i>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
