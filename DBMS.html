        function executeVirtualSQL(rawSql, db) {
            const query = rawSql.trim().replace(/\s+/g, ' ');
            
            // Comprehensive regex supporting SELECT, JOIN, WHERE, GROUP BY, ORDER BY
            const selectRegex = /^SELECT\s+(.+?)\s+FROM\s+(\w+)(?:\s+(INNER|LEFT)\s+JOIN\s+(\w+)\s+ON\s+([\w\.]+)\s*=\s*([\w\.]+))?(?:\s+WHERE\s+(.+?))?(?:\s+GROUP\s+BY\s+(.+?))?(?:\s+ORDER\s+BY\s+([\w\.]+)(?:\s+(ASC|DESC))?)?$/i;
            const match = query.match(selectRegex);

            if (!match) {
                throw new Error("Compiler Syntax Error: Query format is unsupported. Ensure it adheres to the supported syntax template.");
            }

            const [
                _,
                selectColsStr,
                fromTable,
                joinType,
                joinTable,
                joinLhs,
                joinRhs,
                whereClause,
                groupByClause,
                orderByCol,
                orderByDir
            ] = match;

            if (!db[fromTable]) {
                throw new Error(`Catalog Error: Base Table '${fromTable}' does not exist in the relational schema.`);
            }

            let workingSet = _.cloneDeep(db[fromTable]);

            // Retrieve column value handling table prefixes
            const getRowVal = (row, field) => {
                if (row[field] !== undefined) return row[field];
                const dotIdx = field.indexOf('.');
                if (dotIdx !== -1) {
                    const col = field.substring(dotIdx + 1);
                    if (row[col] !== undefined) return row[col];
                }
                for (const k of Object.keys(row)) {
                    if (k.toLowerCase() === field.toLowerCase() || k.toLowerCase().endsWith(`_${field.toLowerCase()}`)) {
                        return row[k];
                    }
                }
                return undefined;
            };

            // Process JOINs (INNER or LEFT)
            if (joinTable) {
                if (!db[joinTable]) {
                    throw new Error(`Catalog Error: Target JOIN Table '${joinTable}' does not exist.`);
                }
                const rightTable = db[joinTable];
                const joinedSet = [];

                workingSet.forEach(rowL => {
                    let matched = false;
                    rightTable.forEach(rowR => {
                        const valL = getRowVal(rowL, joinLhs);
                        const valR = getRowVal(rowR, joinRhs);
                        
                        if (valL !== undefined && valR !== undefined && String(valL) === String(valR)) {
                            // Merge and prefix columns to avoid key collisions
                            const combined = { ...rowL };
                            Object.keys(rowR).forEach(k => {
                                const keyName = rowL[k] !== undefined ? `${joinTable}_${k}` : k;
                                combined[keyName] = rowR[k];
                            });
                            joinedSet.push(combined);
                            matched = true;
                        }
                    });

                    if (joinType.toUpperCase() === 'LEFT' && !matched) {
                        const combined = { ...rowL };
                        Object.keys(rightTable[0]).forEach(k => {
                            const keyName = rowL[k] !== undefined ? `${joinTable}_${k}` : k;
                            combined[keyName] = null;
                        });
                        joinedSet.push(combined);
                    }
                });
                workingSet = joinedSet;
            }

            // Process WHERE conditions
            if (whereClause) {
                const condRegex = /([\w\.]+)\s*(=|>|<|!=|LIKE)\s*(.+)/i;
                const condMatch = whereClause.match(condRegex);
                if (!condMatch) {
                    throw new Error("Syntax Error: Unsupported WHERE condition format. Use syntax like: salary > 60000 or dept_id = 1");
                }
                const [__, colName, op, rawVal] = condMatch;
                let val = rawVal.trim();
                if ((val.startsWith("'") && val.endsWith("'")) || (val.startsWith('"') && val.endsWith('"'))) {
                    val = val.substring(1, val.length - 1);
                }

                workingSet = workingSet.filter(row => {
                    const rowVal = getRowVal(row, colName);
                    if (rowVal === undefined) {
                        throw new Error(`Schema Error: Field '${colName}' not found in the working dataset.`);
                    }

                    if (op === '=') return String(rowVal).toLowerCase() === val.toLowerCase();
                    if (op === '!=') return String(rowVal).toLowerCase() !== val.toLowerCase();
                    if (op === '>') return Number(rowVal) > Number(val);
                    if (op === '<') return Number(rowVal) < Number(val);
                    if (op.toUpperCase() === 'LIKE') {
                        const regexStr = val.replace(/%/g, '.*');
                        const regex = new RegExp(`^${regexStr}$`, 'i');
                        return regex.test(String(rowVal));
                    }
                    return false;
                });
            }

            // Process SELECT projections & Aggregations
            const selectCols = selectColsStr.split(',').map(s => s.trim());
            const aggFunctions = [];
            const nonAggCols = [];

            selectCols.forEach(col => {
                const aggMatch = col.match(/(COUNT|AVG|SUM|MIN|MAX)\((.*?)\)(?:\s+AS\s+(\w+))?/i);
                if (aggMatch) {
                    aggFunctions.push({
                        func: aggMatch[1].toUpperCase(),
                        target: aggMatch[2].trim(),
                        alias: aggMatch[3] ? aggMatch[3].trim() : `${aggMatch[1].toUpperCase()}_${aggMatch[2].replace('.', '_')}`
                    });
                } else {
                    nonAggCols.push(col);
                }
            });

            let finalRows = [];

            if (groupByClause) {
                const groupCol = groupByClause.trim();
                const groups = _.groupBy(workingSet, row => getRowVal(row, groupCol));
                
                finalRows = Object.keys(groups).map(gKey => {
                    const subSet = groups[gKey];
                    const firstRow = subSet[0];
                    const outRow = {};

                    // Project the group column
                    outRow[groupCol] = getRowVal(firstRow, groupCol);
                    // Project extra non-agg columns requested
                    nonAggCols.forEach(col => {
                        if (col !== '*' && col !== groupCol) {
                            outRow[col] = getRowVal(firstRow, col);
                        }
                    });

                    // Evaluate aggregates for this bucket
                    aggFunctions.forEach(agg => {
                        const values = subSet.map(r => getRowVal(r, agg.target)).filter(v => v !== null && v !== undefined);
                        if (agg.func === 'COUNT') {
                            outRow[agg.alias] = agg.target === '*' ? subSet.length : values.length;
                        } else if (agg.func === 'SUM') {
                            outRow[agg.alias] = _.sum(values.map(Number));
                        } else if (agg.func === 'AVG') {
                            outRow[agg.alias] = values.length ? parseFloat((_.sum(values.map(Number)) / values.length).toFixed(2)) : 0;
                        } else if (agg.func === 'MIN') {
                            outRow[agg.alias] = values.length ? _.min(values.map(Number)) : 0;
                        } else if (agg.func === 'MAX') {
                            outRow[agg.alias] = values.length ? _.max(values.map(Number)) : 0;
                        }
                    });
                    return outRow;
                });
            } else if (aggFunctions.length > 0) {
                // Global aggregation on entire dataset (returns single row)
                const outRow = {};
                aggFunctions.forEach(agg => {
                    const values = workingSet.map(r => getRowVal(r, agg.target)).filter(v => v !== null && v !== undefined);
                    if (agg.func === 'COUNT') {
                        outRow[agg.alias] = agg.target === '*' ? workingSet.length : values.length;
                    } else if (agg.func === 'SUM') {
                        outRow[agg.alias] = _.sum(values.map(Number));
                    } else if (agg.func === 'AVG') {
                        outRow[agg.alias] = values.length ? parseFloat((_.sum(values.map(Number)) / values.length).toFixed(2)) : 0;
                    } else if (agg.func === 'MIN') {
                        outRow[agg.alias] = values.length ? _.min(values.map(Number)) : 0;
                    } else if (agg.func === 'MAX') {
                        outRow[agg.alias] = values.length ? _.max(values.map(Number)) : 0;
                    }
                });
                finalRows = [outRow];
            } else {
                // Simple relational projection
                finalRows = workingSet.map(row => {
                    const outRow = {};
                    if (selectCols[0] === '*') {
                        return row;
                    }
                    selectCols.forEach(col => {
                        outRow[col] = getRowVal(row, col);
                    });
                    return outRow;
                });
            }

            // Process ORDER BY sorts
            if (orderByCol) {
                const dir = (orderByDir || 'ASC').toUpperCase() === 'DESC' ? 'desc' : 'asc';
                finalRows = _.orderBy(finalRows, [r => getRowVal(r, orderByCol)], [dir]);
            }

            return finalRows;
        }

        // -------------------------------------------------------------
        // MATHEMATICAL HELPERS: ATTRIBUTE CLOSURES & NORMAL FORM SOLVER
        // -------------------------------------------------------------
        function computeAttributeClosure(attributes, fds) {
            let closure = new Set(attributes);
            let added = true;
            while (added) {
                added = false;
                fds.forEach(fd => {
                    const lhsSet = new Set(fd.lhs);
                    // Check if LHS is a subset of the currently computed closure
                    const lhsIsSubset = [...lhsSet].every(attr => closure.has(attr));
                    if (lhsIsSubset) {
                        fd.rhs.forEach(attr => {
                            if (!closure.has(attr)) {
                                closure.add(attr);
                                added = true;
                            }
                        });
                    }
                });
            }
            return closure;
        }

        function findCandidateKeys(allAttributes, fds) {
            // Sort attributes alphabetically for deterministic combinations
            const attrs = [...allAttributes].sort();
            const keys = [];
            
            // Generate all possible subsets, sorted by length ascending
            const powerSet = (arr) => arr.reduce((subsets, value) => subsets.concat(subsets.map(set => [value, ...set])), [[]]);
            const allSubsets = powerSet(attrs).filter(s => s.length > 0).sort((a, b) => a.length - b.length);

            allSubsets.forEach(subset => {
                const closure = computeAttributeClosure(subset, fds);
                const isSuperkey = attrs.every(attr => closure.has(attr));
                
                if (isSuperkey) {
                    // Check if it is a minimal superkey
                    const isMinimal = !keys.some(key => key.every(attr => subset.includes(attr)));
                    if (isMinimal) {
                        keys.push(subset);
                    }
                }
            });
            return keys;
        }

        function analyzeNormalForm(allAttributes, fds, keys) {
            const primeAttributes = new Set(keys.flat());
            const nonPrimeAttributes = new Set([...allAttributes].filter(a => !primeAttributes.has(a)));
            
            const reports = [];
            let currentHighestNF = "BCNF";

            // Analyze every Functional Dependency
            fds.forEach(fd => {
                const lhsStr = fd.lhs.join('');
                const rhsStr = fd.rhs.join('');
                const lhsSet = new Set(fd.lhs);
                const rhsSet = new Set(fd.rhs);

                // Check non-trivial condition
                const isNontrivial = [...rhsSet].some(attr => !lhsSet.has(attr));
                if (!isNontrivial) return;

                const isLhsSuperkey = keys.some(key => key.every(attr => lhsSet.has(attr)));
                const containsOnlyPrimeRhs = [...rhsSet].every(attr => primeAttributes.has(attr));

                if (!isLhsSuperkey) {
                    // Violates BCNF
                    if (currentHighestNF === "BCNF") {
                        currentHighestNF = "3NF";
                    }
                    
                    if (!containsOnlyPrimeRhs) {
                        // Violates 3NF
                        if (currentHighestNF === "3NF") {
                            currentHighestNF = "2NF";
                        }

                        // Check for Partial Dependency (2NF violation)
                        // Occurs if LHS is a proper subset of ANY Candidate Key
                        const isLhsProperSubsetOfKey = keys.some(key => {
                            const isSubset = fd.lhs.every(attr => key.includes(attr));
                            const isProper = fd.lhs.length < key.length;
                            return isSubset && isProper;
                        });

                        if (isLhsProperSubsetOfKey) {
                            currentHighestNF = "1NF";
                            reports.push({
                                fd: `${fd.lhs.join(', ')} → ${fd.rhs.join(', ')}`,
                                violation: "Partial Dependency",
                                reason: `Determinant {${fd.lhs.join(', ')}} is a proper subset of a candidate key, determining non-prime {${fd.rhs.join(', ')}}.`,
                                targetNF: "2NF"
                            });
                        } else {
                            reports.push({
                                fd: `${fd.lhs.join(', ')} → ${fd.rhs.join(', ')}`,
                                violation: "Transitive Dependency",
                                reason: `Non-prime determinant {${fd.lhs.join(', ')}} transitively determines non-prime {${fd.rhs.join(', ')}}.`,
                                targetNF: "3NF"
                            });
                        }
                    } else {
                        reports.push({
                            fd: `${fd.lhs.join(', ')} → ${fd.rhs.join(', ')}`,
                            violation: "LHS is not a superkey",
                            reason: `Prime attribute {${fd.rhs.join(', ')}} is determined by non-superkey {${fd.lhs.join(', ')}}.`,
                            targetNF: "BCNF"
                        });
                    }
                }
            });

            return { highestNF: currentHighestNF, violations: reports };
        }

        // -------------------------------------------------------------
        // CONCURRENCY LAB COMPILER (PRECEDENCE GRAPH & LOCK ENGINE)
        // -------------------------------------------------------------
        function buildPrecedenceGraph(steps) {
            const nodes = new Set();
            const edges = [];
            const activeSteps = steps.filter(s => s.op && s.item);

            activeSteps.forEach(s => {
                nodes.add(s.tx);
            });

            // Compute conflicts (different transactions, same item, at least one write)
            for (let i = 0; i < activeSteps.length; i++) {
                for (let j = i + 1; j < activeSteps.length; j++) {
                    const stepA = activeSteps[i];
                    const stepB = activeSteps[j];

                    if (stepA.tx !== stepB.tx && stepA.item === stepB.item) {
                        const hasWrite = stepA.op === 'Write' || stepB.op === 'Write';
                        if (hasWrite) {
                            // Directed conflict edge A -> B
                            const edgeExists = edges.some(e => e.from === stepA.tx && e.to === stepB.tx);
                            if (!edgeExists) {
                                edges.push({
                                    from: stepA.tx,
                                    to: stepB.tx,
                                    item: stepA.item,
                                    type: `${stepA.op}-${stepB.op}`
                                });
                            }
                        }
                    }
                }
            }

            // DFS Cycle Detection
            const visited = {};
            const recStack = {};
            let isAcyclic = true;

            const dfs = (node) => {
                visited[node] = true;
                recStack[node] = true;
                
                const neighbors = edges.filter(e => e.from === node).map(e => e.to);
                for (const neighbor of neighbors) {
                    if (!visited[neighbor]) {
                        if (dfs(neighbor)) return true;
                    } else if (recStack[neighbor]) {
                        return true;
                    }
                }
                recStack[node] = false;
                return false;
            };

            for (const node of nodes) {
                if (!visited[node]) {
                    if (dfs(node)) {
                        isAcyclic = false;
                        break;
                    }
                }
            }

            return { nodes: [...nodes], edges, isSerializable: isAcyclic };
        }

            // Solve normalizations dynamically based on attributes and FDs
            const solveNormalization = () => {

                                            <span className="text-[10px] font-mono text-accent">Compiler Status: Clean</span>
                                        </div>
                                        <pre className="bg-surface rounded-lg p-4 font-mono text-xs text-textMain border border-border/50 overflow-x-auto text-left leading-relaxed">
                                            {generatedDDL}
                                        </pre>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
