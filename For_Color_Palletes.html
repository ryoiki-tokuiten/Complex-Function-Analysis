<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematical Software - Dark Workspace</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code&display=swap');

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            margin: 0;
            overflow-x: hidden;
        }

        .workspace-bg {
            background-image: radial-gradient(var(--track-bg) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        * {
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }

        /* Standard Glass Slider */
        input[type=range].glass-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 9999px;
            outline: none;
            background: transparent;
        }

        input[type=range].glass-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow), inset 0 0 4px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        input[type=range].glass-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 16px var(--accent-glow), inset 0 0 4px rgba(0, 0, 0, 0.4);
            transform: scale(1.15);
        }

        /* Color Input Overrides */
        input[type=color]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type=color]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        /* Custom Scrollbar for sleek interfaces */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Dynamic SVG Transitions */
        svg line,
        svg path,
        svg ellipse,
        svg text {
            transition: stroke 0.5s ease, fill 0.5s ease, opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as Lucide from 'lucide-react';

        const { Maximize2, Check, Palette, X, Plus } = Lucide;

        // Curated & Locked UI Themes
        const themes = [
            { id: "terax", name: "Terax", desc: "The default Terax look — clean glass on pure dark.", colors: { bg: '#09090B', panel: '#0F0F13', border: '#27272A', text: '#FAFAFA', textMuted: '#A1A1AA', accent: '#FFFFFF', accentGlow: 'rgba(255,255,255,0.3)', gridPri: '#FB923C', gridSec: '#C084FC' } },
            { id: "tide", name: "Tide", desc: "Deep slate with muted teal.", colors: { bg: '#0B0F12', panel: '#10151A', border: '#1E2732', text: '#E6E6E6', textMuted: '#708291', accent: '#5E8B8B', accentGlow: 'rgba(94,139,139,0.3)', gridPri: '#5E8B8B', gridSec: '#826859' } },
            { id: "rose", name: "Rosé Pine", desc: "Deepened soho vibes, natural pine and rose.", colors: { bg: '#0A0811', panel: '#120F1C', border: '#1E1A2E', text: '#E0DEF4', textMuted: '#908CAA', accent: '#EBBCBA', accentGlow: 'rgba(235,188,186,0.3)', gridPri: '#31748F', gridSec: '#C4A7E7' } },
            { id: "claude", name: "Claude", desc: "Warm clay accent on paper.", colors: { bg: '#171615', panel: '#1C1B1A', border: '#2E2B29', text: '#EAE6DF', textMuted: '#9E9A92', accent: '#D97757', accentGlow: 'rgba(217,119,87,0.3)', gridPri: '#D97757', gridSec: '#6E8070' } },
            { id: "sage", name: "Sage", desc: "Muted forest green — calm and soft.", colors: { bg: '#0C120E', panel: '#111813', border: '#1E2922', text: '#E0E6E2', textMuted: '#89998F', accent: '#8B9E77', accentGlow: 'rgba(139,158,119,0.3)', gridPri: '#8B9E77', gridSec: '#6F8091' } },
            { id: "gruvbox", name: "Gruvbox", desc: "Warm, earthy retro palette.", colors: { bg: '#1D2021', panel: '#282828', border: '#3C3836', text: '#EBDBB2', textMuted: '#A89984', accent: '#FABD2F', accentGlow: 'rgba(250,189,47,0.3)', gridPri: '#FE8019', gridSec: '#D3869B' } },
            { id: "caffeine", name: "Caffeine", desc: "Warm coffee tones — cream and espresso.", colors: { bg: '#14100E', panel: '#1A1513', border: '#2B221E', text: '#E8DCD1', textMuted: '#A69285', accent: '#D4A373', accentGlow: 'rgba(212,163,115,0.3)', gridPri: '#D4A373', gridSec: '#8A6F62' } },
            { id: "gradient", name: "Gradient", desc: "Original app theme, deep obsidian and vivid accents.", colors: { bg: '#0A0A0C', panel: '#1A1A24', border: '#2A2A35', text: '#E2E8F0', textMuted: '#94A3B8', accent: '#00E599', accentGlow: 'rgba(0,229,153,0.3)', gridPri: '#FB923C', gridSec: '#C084FC' } }
        ];

        // Domain Phase Palettes logically mapped (Base -> Mid -> Peak -> Mid -> Base) for smooth 2PI wrap
        const domainPalettes = [
            { name: "Analytic Base", colors: "hsl(0,70%,40%), hsl(60,70%,35%), hsl(120,70%,35%), hsl(180,70%,35%), hsl(240,70%,45%), hsl(300,70%,40%), hsl(360,70%,40%)" },
            { name: "Ocean Depth", colors: "#0f172a, #0369a1, #0ea5e9, #38bdf8, #0ea5e9, #0369a1, #0f172a" },
            { name: "Midnight Flare", colors: "#1e1b4b, #581c87, #9333ea, #e11d48, #9333ea, #581c87, #1e1b4b" },
            { name: "Forest Moss", colors: "#064e3b, #047857, #10b981, #34d399, #10b981, #047857, #064e3b" },
            { name: "Arctic Frost", colors: "#0f172a, #1e293b, #3b82f6, #93c5fd, #3b82f6, #1e293b, #0f172a" },
            { name: "Nordic Twilight", colors: "#2e3440, #4c566a, #5e81ac, #b48ead, #5e81ac, #4c566a, #2e3440" },
            { name: "Gruvbox Earth", colors: "#282828, #504945, #d79921, #b16286, #d79921, #504945, #282828" },
            { name: "Lavender Ash", colors: "#1a1025, #2e233c, #7e57c2, #b39ddb, #7e57c2, #2e233c, #1a1025" },
            { name: "Monochrome Topo", colors: "#0a0a0a, #262626, #525252, #737373, #525252, #262626, #0a0a0a" },
            { name: "Rose Gold", colors: "#1c1917, #78350f, #e11d48, #fda4af, #e11d48, #78350f, #1c1917" }
        ];

        // --- Core UI Components ---
        const GlassSlider = React.memo(({ label, symbol, min, max, step, value, onChange }) => {
            const percentage = ((value - min) / (max - min)) * 100;
            const trackBackground = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${percentage}%, var(--track-bg) ${percentage}%, var(--track-bg) 100%)`;
            return (
                <div className="space-y-2 w-full">
                    <div className="flex justify-between text-[11px] text-[var(--text-muted)] tracking-wide">
                        <span>{label} {symbol && <span className="font-mono text-[var(--accent)] ml-1">{symbol}</span>}</span>
                        <span className="font-mono text-[var(--text)]">{Number(value).toFixed(step < 1 ? 2 : 0)}</span>
                    </div>
                    <div className="relative w-full h-[6px] rounded-full overflow-visible flex items-center">
                        <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseFloat(e.target.value))} className="glass-slider absolute inset-0 w-full h-full cursor-pointer z-10" style={{ background: trackBackground }} />
                    </div>
                </div>
            );
        });

        const CircleColorPicker = ({ label, color, onChange }) => (
            <div className="flex items-center gap-3">
                <div className="relative w-6 h-6 rounded-full border border-[var(--border)] cursor-pointer shadow-sm hover:scale-110 hover:border-[var(--text-muted)] transition-all overflow-hidden flex-shrink-0" style={{ backgroundColor: color }}>
                    <input
                        type="color"
                        value={color}
                        onChange={e => onChange(e.target.value)}
                        className="absolute inset-[-10px] w-[50px] h-[50px] cursor-pointer opacity-0"
                    />
                </div>
                <span className="text-[11px] text-[var(--text-muted)] tracking-wide">{label}</span>
            </div>
        );

        const DomainPaletteSelector = ({ activeIndex, onChange, palettes }) => (
            <div className="space-y-3 w-full">
                <div className="flex justify-between items-center text-[11px] tracking-wide">
                    <span className="text-[var(--text-muted)]">Domain Palette</span>
                    <span className="text-[var(--accent)] font-mono">{palettes[activeIndex].name}</span>
                </div>
                <div className="flex gap-2.5 overflow-x-auto pb-2 pt-1 custom-scroll">
                    {palettes.map((p, idx) => (
                        <button
                            key={idx}
                            onClick={() => onChange(idx)}
                            className={`flex-shrink-0 w-8 h-8 rounded-full border-2 transition-all duration-300 ${activeIndex === idx ? 'border-[var(--accent)] scale-110 shadow-[0_0_12px_var(--accent-glow)]' : 'border-[var(--border)] opacity-60 hover:opacity-100 hover:scale-105'}`}
                            style={{ background: `conic-gradient(${p.colors})` }}
                            title={p.name}
                        />
                    ))}
                </div>
            </div>
        );

        const Panel = ({ children, className = "" }) => (
            <div className={`bg-[var(--panel)] border border-[var(--border)] rounded-2xl p-6 flex flex-col shadow-2xl ${className}`}>
                {children}
            </div>
        );

        const MathBtn = ({ active, children, className = "" }) => (
            <button className={`border rounded-lg py-2.5 px-2 text-[11px] font-mono transition-all duration-300 ${active ? 'bg-[var(--track-bg)] border-[var(--accent)] text-[var(--accent)] shadow-[0_0_15px_var(--accent-glow)]' : 'border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text)] hover:border-[var(--text-muted)] hover:bg-[var(--track-bg)]'} ${className}`}>
                {children}
            </button>
        );

        const CustomCheckbox = ({ label, borderBottom }) => {
            const [checked, setChecked] = useState(false);
            return (
                <div onClick={() => setChecked(!checked)} className={`flex items-center gap-4 py-3.5 cursor-pointer group ${borderBottom ? 'border-b border-[var(--border)]' : ''}`}>
                    <div className={`w-4 h-4 rounded-[4px] border flex items-center justify-center transition-all duration-300 ${checked ? 'border-[var(--accent)] bg-[var(--track-bg)] shadow-[0_0_10px_var(--accent-glow)]' : 'border-[var(--border)] group-hover:border-[var(--text-muted)]'}`}>
                        {checked && <Check size={12} className="text-[var(--accent)]" strokeWidth={3} />}
                    </div>
                    <span className="text-[13px] text-[var(--text-muted)] group-hover:text-[var(--text)] transition-colors duration-300">{label}</span>
                </div>
            );
        };

        const AnalysisToggle = ({ label }) => {
            const [checked, setChecked] = useState(false);
            return (
                <button onClick={() => setChecked(!checked)} className={`flex-1 flex items-center gap-3 border rounded-xl py-3 px-4 transition-all duration-300 ${checked ? 'border-[var(--accent)] bg-[var(--track-bg)] shadow-[0_0_15px_var(--accent-glow)]' : 'border-[var(--border)] hover:border-[var(--text-muted)] hover:bg-[var(--track-bg)]'}`}>
                    <div className={`w-4 h-4 rounded-[4px] border flex items-center justify-center transition-colors ${checked ? 'border-[var(--accent)]' : 'border-[var(--text-muted)]'}`}>
                        {checked && <Check size={12} className="text-[var(--accent)]" strokeWidth={3} />}
                    </div>
                    <span className="text-[12px] text-[var(--text-muted)] tracking-wide">{label}</span>
                </button>
            );
        };

        const ThemeModal = ({ onClose, themes, activeThemeId, onSelectTheme }) => {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-md" onClick={onClose}>
                    <div className="w-full max-w-[850px] bg-[#09090B] border border-[#27272A] rounded-2xl p-8 shadow-2xl flex flex-col gap-6 relative" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-6 right-6 text-[#A1A1AA] hover:text-white transition-colors"><X size={20} /></button>
                        <div className="mb-2">
                            <h2 className="text-2xl font-semibold text-white mb-1 tracking-tight">Themes</h2>
                            <p className="text-sm text-[#A1A1AA]">Theme, background image, and customization.</p>
                        </div>
                        <div className="flex justify-between items-center mb-2">
                            <span className="text-sm font-medium text-[#E4E4E7]">Theme</span>
                            <div className="flex gap-2">
                                <button className="px-3 py-1.5 rounded-lg bg-[#18181B] border border-[#27272A] text-xs font-medium text-[#E4E4E7] flex items-center gap-1.5 hover:bg-[#27272A] transition-colors"><Plus size={14} /> Create</button>
                                <button className="px-3 py-1.5 rounded-lg bg-[#18181B] border border-[#27272A] text-xs font-medium text-[#E4E4E7] hover:bg-[#27272A] transition-colors">Import .terax-theme</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[55vh] overflow-y-auto pr-2 custom-scroll">
                            {themes.map(t => (
                                <button key={t.id} onClick={() => onSelectTheme(t.id)} className={`flex items-center gap-4 p-4 rounded-xl border text-left transition-all duration-300 ${activeThemeId === t.id ? 'border-white bg-[#18181B]' : 'border-[#27272A] bg-[#09090B] hover:bg-[#18181B]'}`}>
                                    <div className="flex gap-1.5 bg-[#18181B] p-2 rounded-lg border border-[#27272A] shrink-0 shadow-inner">
                                        <div className="w-2.5 h-6 rounded-full" style={{ backgroundColor: t.colors.panel }}></div>
                                        <div className="w-2.5 h-6 rounded-full" style={{ backgroundColor: t.colors.accent }}></div>
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-medium text-white mb-0.5">{t.name}</h3>
                                        <p className="text-xs text-[#A1A1AA] leading-relaxed">{t.desc}</p>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [themeId, setThemeId] = useState(themes[0].id);
            const [isModalOpen, setIsModalOpen] = useState(false);

            // Layout & Math parameters
            const [density, setDensity] = useState(15);
            const [phase, setPhase] = useState(0);
            const [zZoom, setZZoom] = useState(1.0);
            const [wZoom, setWZoom] = useState(1.0);

            // Deep Customization Overrides
            const [customZ, setCustomZ] = useState(null);
            const [customW, setCustomW] = useState(null);
            const [paletteIndex, setPaletteIndex] = useState(0);

            const activeTheme = themes.find(t => t.id === themeId) || themes[0];
            const activeDomainPalette = domainPalettes[paletteIndex];

            const currentZColor = customZ || activeTheme.colors.gridPri;
            const currentWColor = customW || activeTheme.colors.gridSec;

            const handleThemeSelect = (id) => {
                setThemeId(id);
                setCustomZ(null);
                setCustomW(null);
            };

            const vars = {
                "--bg": activeTheme.colors.bg,
                "--panel": activeTheme.colors.panel,
                "--border": activeTheme.colors.border,
                "--text": activeTheme.colors.text,
                "--text-muted": activeTheme.colors.textMuted,
                "--accent": activeTheme.colors.accent,
                "--accent-glow": activeTheme.colors.accentGlow,
                "--track-bg": "rgba(255, 255, 255, 0.04)",
                "--grid-z": currentZColor,
                "--grid-w": currentWColor
            };

            // Calculate SVG Grid Geometry
            const stepSize = 600 / density;
            const zLines = [];
            for (let i = 0; i <= 600; i += stepSize) {
                zLines.push(<line key={`v${i}`} x1={i} y1="0" x2={i} y2="400" className="stroke-[var(--grid-z)] opacity-60" strokeWidth="1.5" />);
            }
            for (let i = 0; i <= 400; i += stepSize) {
                zLines.push(<line key={`h${i}`} x1="0" y1={i} x2="600" y2={i} className="stroke-[var(--grid-w)] opacity-60" strokeWidth="1.5" />);
            }

            const wLines = [];
            const numEllipses = Math.max(5, Math.floor(density * 0.7));
            for (let i = 1; i <= numEllipses; i++) {
                wLines.push(<ellipse key={`e${i}`} cx="300" cy="200" rx={i * (300 / numEllipses)} ry={i * (200 / numEllipses)} fill="none" className="stroke-[var(--grid-w)] opacity-60" strokeWidth="1.5" />);
            }
            const numRays = Math.max(6, Math.floor(density * 0.8));
            for (let i = 0; i <= numRays; i++) {
                const offset = (i - numRays / 2) * (600 / numRays);
                if (Math.abs(offset) < 1) {
                    wLines.push(<line key={`c${i}`} x1="300" y1="0" x2="300" y2="400" className="stroke-[var(--grid-z)] opacity-60" strokeWidth="1.5" />);
                } else {
                    const xTop = 300 + offset * 1.5;
                    const xMid = 300 + offset * 0.3;
                    wLines.push(<path key={`c${i}`} d={`M ${xTop} 0 Q ${xMid} 200 ${xTop} 400`} fill="none" className="stroke-[var(--grid-z)] opacity-60" strokeWidth="1.5" />);
                }
            }

            // CSS Domain Coloring Background - Glowing near center, fading to panel color towards edges
            const complexBackgroundStyle = {
                backgroundImage: `radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, var(--panel) 75%), conic-gradient(from ${phase}deg at 50% 50%, ${activeDomainPalette.colors})`
            };

            return (
                <div style={vars} className="min-h-screen bg-[var(--bg)] text-[var(--text)] workspace-bg p-6 lg:p-10 transition-colors duration-500">
                    {isModalOpen && <ThemeModal onClose={() => setIsModalOpen(false)} themes={themes} activeThemeId={themeId} onSelectTheme={handleThemeSelect} />}

                    <div className="max-w-[1600px] mx-auto flex flex-col gap-8">

                        <header className="flex justify-between items-center mb-2 px-2">
                            <div className="flex items-center gap-4">
                                <div className="w-6 h-6 rounded-[6px] bg-[var(--accent)] opacity-90 shadow-[0_0_15px_var(--accent-glow)]"></div>
                                <h1 className="text-xl font-semibold tracking-tight text-[var(--text)]">Mathematical Operations</h1>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-[var(--panel)] border border-[var(--border)] hover:border-[var(--text-muted)] transition-all shadow-lg text-[13px] font-medium text-[var(--text-muted)] hover:text-[var(--text)] group">
                                <Palette size={16} className="text-[var(--accent)] group-hover:rotate-12 transition-transform" />
                                Configuration & Themes
                            </button>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">

                            <Panel className="lg:col-span-4 justify-center gap-4">
                                <div className="text-[10px] font-bold tracking-[0.2em] text-[var(--text-muted)] uppercase mb-1">Matrix Transforms</div>
                                <div className="flex flex-col gap-3">
                                    <div className="flex gap-3">
                                        <MathBtn className="flex-1">Fourier Transform</MathBtn>
                                        <MathBtn className="flex-1">Laplace Transform</MathBtn>
                                        <MathBtn active className="px-5">w = cos(z)</MathBtn>
                                    </div>
                                    <div className="grid grid-cols-4 gap-3">
                                        {['w = sin(z)', 'w = tan(z)', 'w = sec(z)', 'w = e^z'].map(l => <MathBtn key={l}>{l}</MathBtn>)}
                                    </div>
                                    <div className="grid grid-cols-4 gap-3">
                                        {['w = ln(z)', 'w = sinh(z)', 'w = cosh(z)', 'w = tanh(z)'].map(l => <MathBtn key={l}>{l}</MathBtn>)}
                                    </div>
                                    <div className="grid grid-cols-5 gap-3">
                                        {['w = z^n', 'w = 1/z', 'Möbius', 'w = ζ(z)', 'Polynomial'].map(l => <MathBtn key={l}>{l}</MathBtn>)}
                                    </div>
                                </div>
                            </Panel>

                            <Panel className="lg:col-span-4 justify-center px-8">
                                <div className="text-[10px] font-bold tracking-[0.2em] text-[var(--text-muted)] uppercase mb-4">Operational Flags</div>
                                <div className="flex flex-col">
                                    <CustomCheckbox label="Enable Output Chaining" borderBottom />
                                    <CustomCheckbox label="Enable Algebraic Chaining" borderBottom />
                                    <CustomCheckbox label="Navigate through complex plane" borderBottom />
                                    <CustomCheckbox label="General points on the complex plane" />
                                </div>
                            </Panel>

                            <Panel className="lg:col-span-4 justify-between">
                                <div>
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-[10px] font-bold tracking-[0.2em] text-[var(--text-muted)] uppercase">Visualization Engine</h3>
                                    </div>
                                    <div className="grid grid-cols-2 gap-x-10 gap-y-6">
                                        <GlassSlider label="Grid Density:" value={density} onChange={setDensity} min={5} max={30} step={1} />
                                        <GlassSlider label="Domain Phase Offset:" value={phase} onChange={setPhase} min={0} max={360} step={1} symbol="°" />
                                        <GlassSlider label="Z-Plane Zoom:" value={zZoom} onChange={setZZoom} min={0.1} max={3.0} step={0.1} symbol="x" />
                                        <GlassSlider label="W-Plane Zoom:" value={wZoom} onChange={setWZoom} min={0.1} max={3.0} step={0.1} symbol="x" />
                                    </div>

                                    <div className="flex flex-col gap-5 mt-6 pt-5 border-t border-[var(--border)]">
                                        <DomainPaletteSelector activeIndex={paletteIndex} onChange={setPaletteIndex} palettes={domainPalettes} />
                                        <div className="grid grid-cols-2 gap-10 mt-1">
                                            <CircleColorPicker label="Input Grid" color={currentZColor} onChange={setCustomZ} />
                                            <CircleColorPicker label="Output Grid" color={currentWColor} onChange={setCustomW} />
                                        </div>
                                    </div>
                                </div>
                            </Panel>

                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[600px]">

                            <Panel className="p-6 flex flex-col gap-5 relative overflow-hidden group">
                                <div className="flex justify-between items-center px-2 z-20">
                                    <h3 className="text-[var(--text)] font-medium text-[14px] tracking-wide">z-plane <span className="text-[var(--text-muted)] font-mono text-xs ml-2">(Input: Cartesian Map)</span></h3>
                                    <button className="border border-[var(--border)] bg-[var(--track-bg)] rounded-xl p-2.5 text-[var(--text-muted)] hover:text-[var(--accent)] hover:border-[var(--accent)] transition-all shadow-sm">
                                        <Maximize2 size={14} />
                                    </button>
                                </div>
                                <div className="relative w-full flex-1 rounded-xl overflow-hidden border border-[var(--border)] shadow-inner flex items-center justify-center transition-all duration-500 z-10" style={complexBackgroundStyle}>
                                    <svg viewBox="0 0 600 400" className="w-full h-full relative z-10" preserveAspectRatio="xMidYMid slice" style={{ transform: `scale(${zZoom})` }}>
                                        {zLines}
                                        <line x1="0" y1="200" x2="600" y2="200" className="stroke-[var(--text)] opacity-70" strokeWidth="2" />
                                        <line x1="300" y1="0" x2="300" y2="400" className="stroke-[var(--text)] opacity-70" strokeWidth="2" />
                                        {[-4, -3, -2, -1, 1, 2, 3, 4].map(num => (
                                            <text key={`tx${num}`} x={300 + num * 60} y="215" fill="var(--text-muted)" fontSize="10" textAnchor="middle" className="font-mono">{num}</text>
                                        ))}
                                        {[-2.5, -2.0, -1.5, -1.0, -0.5, 0.5, 1.0, 1.5, 2.0, 2.5].map(num => (
                                            <text key={`ty${num}`} x="285" y={200 - num * 60 + 3} fill="var(--text-muted)" fontSize="10" textAnchor="end" className="font-mono">{num.toFixed(1)}</text>
                                        ))}
                                        <text x="560" y="215" fill="var(--text-muted)" fontSize="11">Re(z)</text>
                                        <text x="310" y="20" fill="var(--text-muted)" fontSize="11">Im(z)</text>
                                    </svg>
                                </div>
                            </Panel>

                            <Panel className="p-6 flex flex-col gap-5 relative overflow-hidden group">
                                <div className="flex justify-between items-center px-2 z-20">
                                    <h3 className="text-[var(--text)] font-medium text-[14px] tracking-wide">w-plane <span className="text-[var(--text-muted)] font-mono text-xs ml-2">(Output: w = cos(z))</span></h3>
                                    <button className="border border-[var(--border)] bg-[var(--track-bg)] rounded-xl p-2.5 text-[var(--text-muted)] hover:text-[var(--accent)] hover:border-[var(--accent)] transition-all shadow-sm">
                                        <Maximize2 size={14} />
                                    </button>
                                </div>
                                <div className="relative w-full flex-1 rounded-xl overflow-hidden border border-[var(--border)] shadow-inner flex items-center justify-center transition-all duration-500 z-10" style={complexBackgroundStyle}>
                                    <svg viewBox="0 0 600 400" className="w-full h-full relative z-10" preserveAspectRatio="xMidYMid slice" style={{ transform: `scale(${wZoom})` }}>
                                        {wLines}
                                        <line x1="0" y1="200" x2="600" y2="200" className="stroke-[var(--text)] opacity-70" strokeWidth="2" />
                                        <line x1="300" y1="0" x2="300" y2="400" className="stroke-[var(--text)] opacity-70" strokeWidth="2" />
                                        {[-10, -8, -6, -4, -2, 2, 4, 6, 8, 10].map(num => (
                                            <text key={`wtx${num}`} x={300 + num * 25} y="215" fill="var(--text-muted)" fontSize="10" textAnchor="middle" className="font-mono">{num}</text>
                                        ))}
                                        {[-6, -4, -2, 2, 4, 6].map(num => (
                                            <text key={`wty${num}`} x="285" y={200 - num * 25 + 3} fill="var(--text-muted)" fontSize="10" textAnchor="end" className="font-mono">{num}</text>
                                        ))}
                                        <text x="560" y="215" fill="var(--text-muted)" fontSize="11">Re(w)</text>
                                        <text x="310" y="20" fill="var(--text-muted)" fontSize="11">Im(w)</text>
                                    </svg>
                                </div>
                            </Panel>

                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
